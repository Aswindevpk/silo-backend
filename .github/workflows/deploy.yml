name: Production Deployment

on:
  push:
    branches: [ main ]  # Changed from main to master to match your active branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}     # Your VPS IP address
          username: ${{ secrets.SERVER_USER }} # deploy
          key: ${{ secrets.SERVER_SSH_KEY }}   # Your private SSH Key (~/.ssh/id_ed25519)
          script: /home/deploy/silo-deploy.sh
